<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeDesign BR</title>
    
    <!-- Configuração do Logo na Aba (Favicon) -->
    <!-- O ?v=1 força o navegador a atualizar o ícone e ignorar o cache antigo -->
    <link rel="icon" type="image/png" href="logo.png?v=1">
    <link rel="shortcut icon" href="logo.png?v=1" type="image/x-icon">
    <link rel="apple-touch-icon" href="logo.png?v=1">
    
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="logo-container">
            <!-- Logo que aparece no topo da página -->
            <img src="logo.png" alt="Logo CodeDesign BR" width="50">
            <h1>CodeDesign BR</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home">
            <h2>BEM-VINDO ao CodeDesign BR</h2>
            <p>Sua solução completa para design e desenvolvimento web.</p>
        </section>

        <section id="services">
            <h2>Nossos Serviços</h2>
            <ul>
                <li>Design Web</li>
                <li>Desenvolvimento Web</li>
                <li>Otimização SEO</li>
                <li>Criação de Conteúdo</li>
            </ul>
        </section>

        <section id="contact">
            <h2>Contato</h2>
            <p>WhatsApp: <a href="https://wa.me" target="_blank" id="btn-whats">Entre em contato</a></p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 CodeDesign BR</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
